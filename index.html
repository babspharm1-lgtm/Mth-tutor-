<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTH Tutor — BABSPHARM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<style>
:root {
  --bg:#f7f4ef;--card:#fff;--accent:#1a1a2e;--gold:#c9a84c;--gold-light:#f5e9b8;
  --text:#1a1a2e;--muted:#7a7a8a;--border:#e2ddd5;--green:#2d6a4f;--blue:#1a4a7a;
  --red:#c0392b;--shadow:0 4px 24px rgba(26,26,46,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

header{background:var(--accent);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--gold);letter-spacing:1px;}
.logo span{color:#fff;font-weight:400;}
.badges{display:flex;gap:6px;}
.badge{font-size:0.62rem;padding:3px 9px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:700;}
.b101{background:rgba(45,106,79,0.25);border:1px solid #2d6a4f;color:#6fcf97;}
.b102{background:rgba(26,74,122,0.25);border:1px solid #1a4a7a;color:#74b9ff;}

#course-tabs{display:flex;background:rgba(0,0,0,0.2);flex-shrink:0;}
.ctab{flex:1;text-align:center;padding:8px;font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;transition:all 0.2s;background:var(--accent);}
.ctab.active{color:var(--gold);border-bottom-color:var(--gold);}

#topic-bar{background:var(--accent);padding:6px 12px 10px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
#topic-bar::-webkit-scrollbar{display:none;}
.topic-pill{white-space:nowrap;font-size:0.67rem;font-family:'Syne',sans-serif;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid rgba(201,168,76,0.25);color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.topic-pill:hover,.topic-pill.active{background:var(--gold);color:var(--accent);border-color:var(--gold);}

/* Progress bar */
#progress-wrap{background:rgba(0,0,0,0.15);padding:6px 14px;display:none;flex-shrink:0;align-items:center;gap:10px;}
#progress-wrap.show{display:flex;}
#progress-label{font-size:0.68rem;color:rgba(255,255,255,0.6);font-family:'Syne',sans-serif;font-weight:600;white-space:nowrap;}
#progress-bar-outer{flex:1;height:5px;background:rgba(255,255,255,0.15);border-radius:10px;overflow:hidden;}
#progress-bar-inner{height:100%;background:var(--gold);border-radius:10px;transition:width 0.5s ease;width:0%;}
#progress-step{font-size:0.65rem;color:var(--gold);font-family:'Syne',sans-serif;font-weight:700;white-space:nowrap;}

/* Mode bar */
#mode-bar{padding:6px 12px 6px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);}
#mode-bar::-webkit-scrollbar{display:none;}
.mode-btn{white-space:nowrap;font-size:0.7rem;font-family:'Syne',sans-serif;font-weight:600;padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);color:var(--muted);background:var(--card);cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.mode-btn:hover{border-color:var(--gold);color:var(--accent);}
.mode-btn.active{background:var(--accent);color:var(--gold);border-color:var(--accent);}

/* Chat */
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:13px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.msg{display:flex;gap:9px;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif;}
.msg.ai .avatar{background:var(--gold);color:var(--accent);}
.msg.user .avatar{background:var(--accent);color:var(--gold);border:1px solid var(--gold);}
.bubble{padding:12px 15px;border-radius:14px;font-size:0.85rem;line-height:1.72;max-width:calc(100% - 46px);box-shadow:var(--shadow);}
.msg.ai .bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:3px;}
.msg.user .bubble{background:var(--accent);color:#fff;border-top-right-radius:3px;}
.bubble strong{color:var(--gold);font-weight:700;}
.msg.user .bubble strong{color:var(--gold-light);}

/* Teaching cards */
.card{margin:9px 0;padding:10px 13px;border-radius:10px;font-size:0.83rem;line-height:1.65;}
.card.analogy{background:rgba(108,117,125,0.07);border-left:3px solid #6c757d;font-style:italic;}
.card.define{background:rgba(45,106,79,0.07);border-left:3px solid var(--green);}
.card.formula{background:rgba(201,168,76,0.09);border-left:3px solid var(--gold);}
.card.example{background:rgba(26,74,122,0.07);border-left:3px solid var(--blue);}
.card.step{background:rgba(201,168,76,0.06);border-left:3px solid var(--gold);margin:4px 0;}
.card.warn{background:rgba(192,57,43,0.06);border-left:3px solid var(--red);}
.card.tip{background:rgba(45,106,79,0.08);border-left:3px solid var(--green);}
.card.check{background:rgba(26,74,122,0.06);border:1.5px dashed rgba(26,74,122,0.35);border-radius:10px;text-align:center;padding:13px;}
.card.answer{background:rgba(45,106,79,0.08);border-left:3px solid var(--green);}
.card-label{font-family:'Syne',sans-serif;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;opacity:0.65;}

/* Quick reply chips */
.reply-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.chip{font-size:0.75rem;padding:5px 14px;border-radius:20px;border:1px solid var(--gold);color:var(--accent);background:var(--gold-light);cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all 0.15s;}
.chip:hover{background:var(--gold);color:#fff;}

/* Typing */
.typing .bubble{padding:13px 16px;}
.dot-flashing{display:flex;gap:4px;}
.dot-flashing span{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:dotb 1.2s infinite;}
.dot-flashing span:nth-child(2){animation-delay:0.2s}.dot-flashing span:nth-child(3){animation-delay:0.4s}
@keyframes dotb{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1}}

/* Revision History Panel */
#history-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;}
#history-overlay.open{display:flex;}
#history-panel{background:var(--card);width:100%;border-radius:20px 20px 0 0;padding:20px 16px 30px;max-height:75vh;display:flex;flex-direction:column;gap:12px;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#history-header{display:flex;justify-content:space-between;align-items:center;}
#history-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--accent);}
#history-close{background:var(--bg);border:none;border-radius:50%;width:30px;height:30px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#history-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;}
.history-item{background:var(--bg);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);}
.history-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.history-icon.done{background:rgba(45,106,79,0.12);}
.history-icon.partial{background:rgba(201,168,76,0.12);}
.history-meta{flex:1;}
.history-topic{font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;color:var(--accent);}
.history-sub{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.history-badge{font-size:0.65rem;font-family:'Syne',sans-serif;font-weight:700;padding:2px 8px;border-radius:20px;}
.history-badge.done{background:rgba(45,106,79,0.12);color:var(--green);}
.history-badge.partial{background:rgba(201,168,76,0.12);color:#a07d20;}
#history-empty{text-align:center;color:var(--muted);font-size:0.85rem;padding:30px 0;}

/* Input */
#input-area{padding:10px 14px 14px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:9px;align-items:flex-end;flex-shrink:0;}
#user-input{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--text);background:var(--bg);outline:none;resize:none;max-height:90px;line-height:1.5;transition:border-color 0.2s;}
#user-input:focus{border-color:var(--gold);}
#user-input::placeholder{color:var(--muted);}
#send-btn{width:40px;height:40px;border-radius:12px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
#send-btn:hover{background:var(--gold);}
#send-btn svg{width:17px;height:17px;fill:none;stroke:white;stroke-width:2;}
#send-btn:hover svg{stroke:var(--accent);}
#send-btn:disabled{opacity:0.4;cursor:not-allowed;}
</style>
</head>

// ── Revision History ──────────────────────────────────────────────────────
// Each entry: { topic, label, course, subtopicsTotal, subtopicsDone, date, status }
const revisionHistory = [];

function recordHistory(topicData, subtopicsDone) {
  const existing = revisionHistory.find(h => h.topic === topicData.topic);
  const status = subtopicsDone >= topicData.subtopics.length ? 'done' : 'partial';
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-NG', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
  if (existing) {
    existing.subtopicsDone = Math.max(existing.subtopicsDone, subtopicsDone);
    existing.status = existing.subtopicsDone >= topicData.subtopics.length ? 'done' : 'partial';
    existing.date = dateStr;
  } else {
    revisionHistory.unshift({ topic: topicData.topic, label: topicData.label, subtopicsTotal: topicData.subtopics.length, subtopicsDone, status, date: dateStr });
  }
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  if (revisionHistory.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  // Clear existing items (keep empty div)
  list.querySelectorAll('.history-item').forEach(el => el.remove());
  revisionHistory.forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const pct = Math.round((h.subtopicsDone / h.subtopicsTotal) * 100);
    item.innerHTML = `
      <div class="history-icon ${h.status}">${h.status === 'done' ? '✅' : '📖'}</div>
      <div class="history-meta">
        <div class="history-topic">${h.label}</div>
        <div class="history-sub">${h.subtopicsDone} of ${h.subtopicsTotal} areas covered · ${h.date}</div>
        <div style="margin-top:5px;height:4px;background:#e2ddd5;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${h.status==='done'?'#2d6a4f':'#c9a84c'};border-radius:4px;transition:width 0.4s"></div>
        </div>
      </div>
      <div class="history-badge ${h.status}">${h.status === 'done' ? 'Complete' : pct + '%'}</div>`;
    list.appendChild(item);
  });
}

// ── Progress bar ──────────────────────────────────────────────────────────
function updateProgress(topic, index, total) {
  const wrap = document.getElementById('progress-wrap');
  wrap.classList.add('show');
  document.getElementById('progress-label').textContent = topic;
  document.getElementById('progress-bar-inner').style.width = ((index/total)*100) + '%';
  document.getElementById('progress-step').textContent = index + ' / ' + total;
}

function hideProgress() {
  document.getElementById('progress-wrap').classList.remove('show');
}

// ── Render topics ─────────────────────────────────────────────────────────
function renderTopics(course) {
  const bar = document.getElementById('topic-bar');
  bar.innerHTML = '';
  const allPill = document.createElement('div');
  allPill.className = 'topic-pill active';
  allPill.textContent = '✦ All';
  allPill.onclick = () => {
    activeTopic = null; activeSubtopics = []; currentSubtopicIndex = 0; teachingInProgress = false;
    bar.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
    allPill.classList.add('active');
    hideProgress();
    appendAI(`All topics unlocked! Tell me what you want to study. I'll teach every single area of whatever topic you pick — one step at a time. 📚`);
  };
  bar.appendChild(allPill);
  const list = course === 'all' ? [...TOPICS['101'], ...TOPICS['102']] : TOPICS[course];
  list.forEach(data => {
    const pill = document.createElement('div');
    pill.className = 'topic-pill';
    pill.textContent = data.label;
    pill.onclick = () => {
      bar.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      startTopic(data);
    };
    bar.appendChild(pill);
  });
}

function startTopic(data) {
  activeTopic = data.topic;
  activeSubtopics = data.subtopics;
  currentSubtopicIndex = 0;
  teachingInProgress = true;
  updateProgress(data.label, 0, data.subtopics.length);
  if (activeMode === 'teach') {
    send(`START_TEACHING:${data.topic}`);
  } else if (activeMode === 'practice') {
    send(`Give me a practice question on ${data.topic}`);
  } else if (activeMode === 'exam') {
    send(`Give me exam prep for ${data.topic}`);
  } else if (activeMode === 'summary') {
    send(`Give me a complete summary of ${data.topic}`);
  } else {
    appendAI(`We're now on **${data.topic}**. What would you like — should I teach it, solve a problem, or test you? 🎓`);
  }
}

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
let messages = [];

function fmt(text) {
  text = text
    .replace(/\[ANALOGY\]([\s\S]*?)\[\/ANALOGY\]/g, '<div class="card analogy"><div class="card-label">💡 Analogy</div>$1</div>')
    .replace(/\[DEFINE\]([\s\S]*?)\[\/DEFINE\]/g, '<div class="card define"><div class="card-label">📖 Definition</div>$1</div>')
    .replace(/\[FORMULA\]([\s\S]*?)\[\/FORMULA\]/g, '<div class="card formula"><div class="card-label">📐 Formula</div>$1</div>')
    .replace(/\[EXAMPLE\]([\s\S]*?)\[\/EXAMPLE\]/g, '<div class="card example"><div class="card-label">✏️ Worked Example</div>$1</div>')
    .replace(/\[STEP\]([\s\S]*?)\[\/STEP\]/g, '<div class="card step">$1</div>')
    .replace(/\[WARN\]([\s\S]*?)\[\/WARN\]/g, '<div class="card warn"><div class="card-label">⚠️ Common Mistake</div>$1</div>')
    .replace(/\[TIP\]([\s\S]*?)\[\/TIP\]/g, '<div class="card tip"><div class="card-label">🎯 Exam Tip</div>$1</div>')
    .replace(/\[CHECK\]([\s\S]*?)\[\/CHECK\]/g, '<div class="card check"><div class="card-label">🤔 Check Your Understanding</div>$1</div>')
    .replace(/\[ANSWER\]([\s\S]*?)\[\/ANSWER\]/g, '<div class="card answer"><div class="card-label">✅ Answer</div>$1</div>');

  text = text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:rgba(0,0,0,0.07);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:0.82em">$1</code>')
    .replace(/^#{1,3}\s(.+)$/gm,'<div style="font-family:Syne,sans-serif;font-weight:700;font-size:0.9rem;margin:9px 0 3px;color:#1a1a2e">$1</div>')
    .replace(/^[-•]\s(.+)/gm,'<div style="padding-left:14px;margin:2px 0">• $1</div>')
    .replace(/\n/g,'<br>');
  return text;
}

function addChips(el, chips) {
  const div = document.createElement('div');
  div.className = 'reply-chips';
  chips.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = c;
    chip.onclick = () => send(c);
    div.appendChild(chip);
  });
  el.querySelector('.bubble').appendChild(div);
}

function appendAI(text, chips) {
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.innerHTML = `<div class="avatar">Mr B</div><div class="bubble">${fmt(text)}</div>`;
  chatEl.appendChild(msg);
  if (chips && chips.length) addChips(msg, chips);
  chatEl.scrollTop = chatEl.scrollHeight;
  if (window.MathJax) MathJax.typesetPromise([msg]).catch(()=>{});
}

  const msg = document.createElement('div');

- Key definitions, all important formulas in LaTeX, 3-5 key points, compact worked examples, common mistakes`;
  }

  return SYSTEM_BASE + modeInstructions + `\n\nCURRENT TOPIC FOCUS: ${activeTopic || 'Any MTH 101/102 topic the student asks about'}`;
}

async function send(rawText) {
  let displayText = rawText;
  let apiText = rawText;

  // Handle internal start command
  if (rawText.startsWith('START_TEACHING:')) {
    const topic = rawText.replace('START_TEACHING:', '');
    displayText = null;
    apiText = `Hi Mr. BABS! I want to learn everything about ${topic}. Please start teaching me from the very beginning, covering every single area step by step.`;
  }

  if (!apiText.trim() || sendBtn.disabled) return;

  if (displayText) addMsg('user', displayText);
  messages.push({role:'user', content: apiText});
  if (displayText) { inputEl.value = ''; inputEl.style.height = 'auto'; }
  sendBtn.disabled = true;
  const typing = addTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json', 'Authorization':'Bearer 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'},
      body: JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:1000,
        messages:[{role:'system', content: buildContext()}, ...messages]
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Something went wrong. Please try again.';
    typing.remove();
    addMsg('ai', reply);
    messages.push({role:'assistant', content: reply});

    // Advance subtopic index if teaching
    if (activeMode === 'teach' && activeTopic && teachingInProgress) {
      const topicData = [...TOPICS['101'],...TOPICS['102']].find(t => t.topic === activeTopic);
      if (topicData) {
        if (!rawText.startsWith('START_TEACHING:') && currentSubtopicIndex < topicData.subtopics.length) {
          currentSubtopicIndex = Math.min(currentSubtopicIndex + 1, topicData.subtopics.length);
          updateProgress(topicData.label, currentSubtopicIndex, topicData.subtopics.length);
          recordHistory(topicData, currentSubtopicIndex);
          if (currentSubtopicIndex >= topicData.subtopics.length) {
            setTimeout(() => {
              appendAI(`🎉 **We've covered every area of ${activeTopic}!**\n\nYou've gone through all ${topicData.subtopics.length} sub-areas. You should now have a solid understanding of this topic at university level.\n\nWhat would you like to do next?`,
                ['Give me practice questions!', 'Move to another topic', 'Revisit a part']);
              hideProgress();
              teachingInProgress = false;
            }, 500);
          }
        }
      }
    }
  } catch {
    typing.remove();
    addMsg('ai','⚠️ Connection error. Check your internet and try again.');
  }
  sendBtn.disabled = false;
  if (displayText) inputEl.focus();
}

sendBtn.addEventListener('click', () => send(inputEl.value));
inputEl.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(inputEl.value); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 90)+'px';
});
